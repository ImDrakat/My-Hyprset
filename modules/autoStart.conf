exec-once = $terminal
exec-once = nm-applet &
exec-once = waybar & swww-daemon & 
exec-once = hypridle & hyprlock &
exec-once = /usr/lib/kdeconnect
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sleep 2 && /usr/lib/polkit-kde-authentication-agent-1
exec-once = swaync
exec-once = wl=paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = kdeconnect-indicator &
exec-once = nm-applet --indicator %
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP exec-once = /usr/lib/kdeconnectd 
exec-once = nice -n -20 /usr/lib/kdeconnectd

